    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fff;
            color: #000;
        }

        .coming-soon-container {
            text-align: center;
        }

        .content h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .time {
            text-align: center;
            font-size: 1.5rem;
        }

        .time span:first-child {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .content h1 {
                font-size: 2rem;
            }

            .countdown {
                flex-direction: column;
                gap: 10px;
            }

            .time span:first-child {
                font-size: 2rem;
            }
        }
    </style>
